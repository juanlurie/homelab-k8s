apiVersion: argoproj.io/v1alpha1                                                                                            
kind: Application                                                                                                           
metadata:                                                                                                                   
  name: uptime-kuma                                                                                                         
  namespace: argocd                                                                                                         
spec:
  project: default                                                                                                          
  source:       
    repoURL: https://github.com/juanlurie/homelab-k8s
    targetRevision: HEAD                    
    path: apps/uptime-kuma              
  destination:
    server: https://kubernetes.default.svc                                                                                  
    namespace: uptime-kuma
  syncPolicy:                                                                                                               
    automated:  
      prune: true
      selfHeal: true                        
    syncOptions:                        
      - CreateNamespace=true